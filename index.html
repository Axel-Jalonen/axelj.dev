<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Developer, investor, designer." />
        <link rel="icon" type="image/svg+xml" href="./favicon.svg" />
        <link rel="stylesheet" href="./style.css" />
        <title>Axel Jalonen</title>
    </head>
    <style>
        #message {
            background: red;
            padding: 3rem;
            user-select: none;
            width: 500px;
            border: 5px solid red;
            height: 250px;
            position: absolute;
            top: 0;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            color: black;
            font-family: Impact;
            text-transform: uppercase;
        }
        @media screen and (max-width: 500px) {
            #message {
                width: calc(100vw - 105px);
                position: absolute;
            }
        }
    </style>
    <body>
        <div id="message">WAKE UP</div>
        <main>
            <p id="about">Investor, designer, programmer...</p>
            <ul id="projects">
                <li>
                    <a href="https://readcomp.axelj.dev/">"Compress"</a>
                </li>
                <li>
                    <a href="https://graphing.axelj.dev">Graph</a>
                </li>
                <li>
                    <a href="https://tsp.axelj.dev/">Travel</a>
                </li>
                <li>
                    <a href="https://writer.axelj.dev/">Write</a>
                </li>
                <li>
                    <a href="https://drawing.axelj.dev/">Draw</a>
                </li>
                <li>
                    <a href="https://nbody.axelj.dev/">Simulate Gravity</a>
                </li>
            </ul>
            <ul id="socials">
                <li>
                    <a href="https://github.com/axel-jalonen/">Github</a>
                </li>
            </ul>
        </main>
    </body>
    <script>
        const messageElement = document.getElementById("message");

        function flash() {
            messageElement.style.background =
                messageElement.style.background == "black" ? "red" : "black";
            messageElement.style.color =
                messageElement.style.color == "red" ? "black" : "red";
            messageElement.style.borderColor =
                messageElement.style.borderColor == "red" ? "black" : "red";
        }

        setInterval(flash, 500);
    </script>
</html>
